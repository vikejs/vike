name: Publish new Release

on:
  push:
    branches:
      - main
    paths:
      - 'CHANGELOG.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish_package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    environment: release
    steps:
      - uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
      - name: Install modules
        run: pnpm install --filter ./packages/vike
      - name: Create NPM release
        working-directory: ./packages/vike
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create GitHub release
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs')

            // Create sections object from CHANGELOG.md
            const changelog = fs.readFileSync('./CHANGELOG.md', 'utf8')
            const sections = {}
            const regex = /^## \[([^\]]+)\]/gm
            let match
            const matches = []

            while ((match = regex.exec(changelog)) !== null) {
              matches.push({ version: match[1], index: match.index })
            }

            for (let i = 0; i < matches.length; i++) {
              const start = changelog.indexOf('\n', matches[i].index)
              const end = i + 1 < matches.length ? matches[i + 1].index : changelog.length
              const notes = changelog.substring(start, end).trim()
              const tag = `v${matches[i].version}`
              sections[tag] = notes
            }

            const { owner, repo } = context.repo

            const { data: releases } = await github.rest.repos.listReleases({
              owner,
              repo,
              per_page: 100 // Default is 30
            })

            const defaultBranch = '${{ github.event.repository.default_branch }}'
            const version = require('./packages/vike/package.json').version
            const versionTag = `v${version}`

            // Create release
            if (releases.length === 0 || releases[0].tag_name !== versionTag) {
              await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: versionTag,
                target_commitish: defaultBranch,
                name: versionTag,
                body: sections[versionTag],
                draft: false,
                prerelease: false,
                generate_release_notes: false
              })

              console.log(`Created release ${versionTag}`)
            }

            // Update releases
            for (const release of releases) {
              const body = sections[release.tag_name]
              if (body && body !== release.body) {
                await github.rest.repos.updateRelease({
                  owner,
                  repo,
                  release_id: release.id,
                  body
                })

                console.log(`Updated release ${release.tag_name}`)
              }
            }
