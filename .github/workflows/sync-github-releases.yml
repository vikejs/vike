name: Sync GitHub Releases

on:
  push:
    branches:
      - main
    paths:
      - 'packages/**/CHANGELOG.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync_github_releases:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment: release
    steps:
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Create GitHub releases
        # Which packages to sync is determined by the script from the GitHub Actions event:
        # GITHUB_EVENT_NAME, GITHUB_SHA and GITHUB_EVENT_PATH are provided automatically.
        run: bun ./.github/workflows/sync-github-releases/index.ts
        env:
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITHUB_TOKEN: ${{ github.token }}
